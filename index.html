<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビジネス基礎 用語マスター RPG</title>
  <style>
    :root {
      --primary:#0d6efd; --success:#28a745; --danger:#dc3545;
      --bg:#f4f7f9; --card-bg:#fff; --border:#ddd; --muted:#777; --radius:14px;
      --c1-bg:#eef6ff; --c1-bd:#b7d7ff; --c1-tx:#004488;
      --c2-bg:#f3efff; --c2-bd:#d2c6ff; --c2-tx:#330088;
      --c3-bg:#fff2f2; --c3-bd:#ffc2c2; --c3-tx:#880000;
      --c4-bg:#fff7e6; --c4-bd:#ffd08a; --c4-tx:#884400;
      --c5-bg:#effff4; --c5-bd:#b7f0c6; --c5-tx:#006622;
      --c6-bg:#f0fcff; --c6-bd:#9ee8f7; --c6-tx:#006070;
      --c7-bg:#fff0fb; --c7-bd:#f4b4e3; --c7-tx:#7a0050;
      --c8-bg:#f7fff0; --c8-bd:#c8efa5; --c8-tx:#3b6500;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif; background:var(--bg); min-height:100vh; padding:14px 12px 48px; color:#222; }
    .page-header { max-width:720px; margin:0 auto 10px; }
    .page-header h1 { font-size:20px; font-weight:900; }
    .page-header p { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.5; }
    .card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:0 4px 14px rgba(0,0,0,.07); max-width:720px; margin:0 auto 14px; }
    .status-bar { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; border:2px solid #333; margin-bottom:14px; background:linear-gradient(270deg,#ffe6e6,#e6f0ff,#e6ffe6,#fffde6); background-size:800% 800%; animation:bgAnim 16s ease infinite; }
    @keyframes bgAnim { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .char-icon { font-size:42px; animation:bounce 2s infinite; flex-shrink:0; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .char-info { flex:1; min-width:0; }
    #playerName { font-size:14px; padding:5px 8px; margin-bottom:5px; width:100%; max-width:220px; border:2px solid #ccc; border-radius:6px; font-weight:bold; display:block; }
    #playerName:read-only { background:#eee; color:#555; border-color:#ddd; }
    .char-name { font-weight:800; font-size:15px; color:#333; }
    .char-next { font-size:11px; color:#555; margin-top:2px; }
    .stat-block { text-align:right; flex-shrink:0; }
    .stat-block .num { font-weight:900; font-size:20px; }
    .stat-block .lbl { font-size:11px; color:var(--muted); }
    .mini-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
    .mini-box { background:#fff; border:1px solid var(--border); border-radius:10px; padding:8px 4px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,.05); }
    .mini-box .val { font-size:18px; font-weight:900; display:block; }
    .mini-box .lbl { font-size:11px; color:var(--muted); display:block; margin-top:1px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:8px 10px; align-items:center; margin-bottom:12px; }
    select, button { font-family:inherit; }
    select { padding:7px 10px; border-radius:8px; border:1px solid var(--border); background:#fff; font-size:13px; max-width:100%; }
    button { border-radius:10px; border:1px solid var(--border); background:#fff; cursor:pointer; transition:all .16s; }
    button:hover { opacity:.92; transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.1); }
    .act-btn { padding:8px 14px; font-weight:700; color:#444; font-size:13px; }
    #mistakeBtn { color:#c33; border-color:#fcc; background:#fff5f5; font-weight:bold; display:none; }
    .list-btn { background:#e8f0fe; border-color:#7baaf7; color:#1a56db; }
    .prog-wrap { background:#eee; border-radius:99px; height:8px; margin-bottom:14px; overflow:hidden; }
    .prog-bar { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--primary),#00c6ff); transition:width .4s ease; width:0%; }
    .q-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px; }
    .cat-tag { font-size:11px; background:#eee; padding:3px 10px; border-radius:99px; color:#555; }
    .q-count { font-size:12px; color:var(--muted); }
    .q-box { background:#f8faff; border:2px solid #d0e4ff; border-radius:12px; padding:16px 18px; margin-bottom:14px; min-height:92px; display:flex; align-items:center; justify-content:center; text-align:center; }
    .q-text { font-size:15px; font-weight:700; line-height:1.7; color:#1a2a4a; }
    .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    @media(max-width:520px){ .choices{grid-template-columns:1fr;} .status-bar{align-items:flex-start;} .stat-block .num{font-size:18px;} }
    .c-btn { padding:13px 10px; min-height:54px; font-size:13px; font-weight:800; line-height:1.35; border-radius:12px; text-align:center; transition:all .14s; }
    .c-btn:disabled { cursor:default; transform:none!important; box-shadow:none!important; }
    .c-btn.correct { background:#d4edda!important; border-color:#28a745!important; color:#155724!important; box-shadow:0 0 0 3px #28a74540!important; }
    .c-btn.wrong { background:#f8d7da!important; border-color:#dc3545!important; color:#721c24!important; }
    .col-1 { background:var(--c1-bg); border-color:var(--c1-bd); color:var(--c1-tx); }
    .col-2 { background:var(--c2-bg); border-color:var(--c2-bd); color:var(--c2-tx); }
    .col-3 { background:var(--c3-bg); border-color:var(--c3-bd); color:var(--c3-tx); }
    .col-4 { background:var(--c4-bg); border-color:var(--c4-bd); color:var(--c4-tx); }
    .col-5 { background:var(--c5-bg); border-color:var(--c5-bd); color:var(--c5-tx); }
    .col-6 { background:var(--c6-bg); border-color:var(--c6-bd); color:var(--c6-tx); }
    .col-7 { background:var(--c7-bg); border-color:var(--c7-bd); color:var(--c7-tx); }
    .col-8 { background:var(--c8-bg); border-color:var(--c8-bd); color:var(--c8-tx); }
    #resultMsg { font-size:15px; font-weight:800; min-height:1.6em; margin-bottom:4px; }
    .ok { color:var(--success); font-weight:900; } .ng { color:var(--danger); font-weight:900; }
    #stageClear { display:none; text-align:center; padding:26px 0; }
    #stageClear .big-ico { font-size:56px; } #stageClear h2 { font-size:20px; font-weight:900; margin:10px 0 6px; }
    #stageClear .sub { color:var(--muted); font-size:13px; margin-bottom:18px; line-height:1.6; }
    .next-btn { background:#333; color:#fff; padding:12px 26px; font-size:14px; font-weight:800; border-radius:12px; border:none; }
    .summary { display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; padding-top:12px; border-top:1px solid #eee; margin-top:12px; font-size:13px; color:var(--muted); }
    .summary .push { margin-left:auto; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:200; padding:20px; overflow-y:auto; }
    .modal-inner { background:#fff; max-width:640px; margin:40px auto; padding:22px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px; }
    .modal-head h3 { font-size:17px; } .close-x { font-size:22px; border:none; background:none; cursor:pointer; line-height:1; }
    .m-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #eee; gap:8px; }
    .m-item:last-child { border:none; } .m-name { font-weight:bold; font-size:14px; } .m-cat { font-size:11px; color:#0a7; margin-top:2px; }
    .del-btn { font-size:11px; padding:4px 10px; border:1px solid #ccc; background:#f0f0f0; border-radius:6px; white-space:nowrap; }
    .term-table { width:100%; border-collapse:collapse; font-size:12px; }
    .term-table th,.term-table td { border-bottom:1px solid #eee; padding:8px; text-align:left; vertical-align:top; }
    .term-table th { background:#f7f7f7; position:sticky; top:0; }
    .term-list-wrap { max-height:430px; overflow:auto; border:1px solid #eee; border-radius:8px; }
  </style>
</head>
<body>
<div class="page-header">
  <h1>📗 ビジネス基礎 用語マスター RPG</h1>
  <p>解説を読んで正しい用語を4択から選ぼう！全8章・246語対応。間違えると苦手リストへ自動登録。</p>
</div>
<div class="card">
  <div class="status-bar">
    <div class="char-icon" id="charIcon">🥚</div>
    <div class="char-info">
      <input type="text" id="playerName" placeholder="名前を入力（必須）" onblur="lockName()">
      <div class="char-name" id="charName">Lv.1 まなびのたまご</div>
      <div class="char-next" id="charNext">あと ? 問で進化</div>
    </div>
    <div class="stat-block"><div class="lbl">累計正解</div><div class="num"><span id="totalAcc">0</span>問</div></div>
  </div>
  <div class="mini-stats">
    <div class="mini-box"><span class="val" id="sLearned">0</span><span class="lbl">習得済（<span id="sTotal">246</span>語中）</span></div>
    <div class="mini-box"><span class="val" id="sUnlearned">246</span><span class="lbl">未習得</span></div>
    <div class="mini-box"><span class="val" id="sPct">0%</span><span class="lbl">達成率</span></div>
  </div>
  <div class="toolbar">
    <select id="catSel" onchange="onFilterChange()"></select>
    <select id="modeSel" onchange="onFilterChange()">
      <option value="all">すべて</option><option value="unlearned">未習得のみ
    </select>
    <button id="mistakeBtn" class="act-btn" onclick="openMistake()">⚠️ 苦手（<span id="mistakeCnt">0</span>）</button>
    <button class="act-btn list-btn" onclick="openTermList()">📘 用語一覧</button>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
  <div id="quizArea">
    <div class="q-meta"><span class="cat-tag" id="qCat">—</span><span class="q-count" id="qCount">— / —</span></div>
    <div class="q-box"><div class="q-text" id="qText">カテゴリを選ぶか、そのままスタート！</div></div>
    <div class="choices" id="choicesGrid"></div>
    <div id="resultMsg"></div>
  </div>
  <div id="stageClear">
    <div class="big-ico">🎉</div><h2>ステージクリア！</h2><div class="sub" id="clearSub"></div>
    <button class="next-btn" onclick="nextLap()">次のステージへ ▶</button>
  </div>
  <div class="summary">
    <span>今回：<span id="sc">0</span> / <span id="tc">0</span> 問正解</span>
    <span class="push">残り <span id="remQ">0</span> 問 ／ <span id="lapNum">1</span> 周目</span>
    <button class="act-btn" onclick="skipQ()">スキップ</button>
    <button class="act-btn" onclick="resetAll()" style="color:#c33;">リセット</button>
  </div>
</div>
<div id="mistakeModal" class="modal"><div class="modal-inner">
  <div class="modal-head"><h3>📝 苦手リスト</h3><button class="close-x" onclick="closeMistake()">✕</button></div>
  <p style="font-size:12px;color:#888;margin-bottom:10px;">間違えた問題が自動追加されます。削除すると苦手リストから外れます。</p>
  <div id="mistakeList" style="max-height:340px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:8px;"></div>
  <div style="margin-top:16px;text-align:center;"><button class="act-btn" onclick="closeMistake()">閉じる</button></div>
</div></div>
<div id="termModal" class="modal"><div class="modal-inner" style="max-width:820px;">
  <div class="modal-head"><h3>📘 ビジネス基礎 用語一覧</h3><button class="close-x" onclick="closeTermList()">✕</button></div>
  <div class="term-list-wrap"><table class="term-table"><thead><tr><th style="width:24%;">章</th><th style="width:20%;">用語</th><th>解説</th></tr></thead><tbody id="termTbody"></tbody></table></div>
</div></div>

売買取引","q":"現金通貨を使わない決済。クレジットカードによる決済，電子マネーによる決済，コード決済などがある。","a":"キャッシュレス決済"},{"cat":"7章 ビジネス計算","q":"二つの量を比較するときに，比較される量を，基準となる量で割った比率。小数，百分率，歩合，分数などで表される。","a":"割合"},{"cat":"7章 ビジネス計算","q":"商品を仕入れるときにかかる，引取運賃や倉庫料などの諸費用。","a":"仕入諸掛"},{"cat":"7章 ビジネス計算","q":"商品を仕入れたときの金額に，仕入諸掛を加えた金額。","a":"仕入原価"},{"cat":"7章 ビジネス計算","q":"仕入原価に見込利益額を加えた金額。","a":"予定売価"},{"cat":"7章 ビジネス計算","q":"仕入原価に見込利益額を加えること。","a":"値入れ"},{"cat":"7章 ビジネス計算","q":"見込利益額の仕入原価に対する割合。値入率ともいう。","a":"見込利益率"},{"cat":"7章 ビジネス計算","q":"予定売価に対する値引きの割合。","a":"値引率"},{"cat":"7章 ビジネス計算","q":"予定売価から値引きしたあとの売価。","a":"実売価"},{"cat":"7章 ビジネス計算","q":"実売価と仕入原価との差額。仕入原価が実売価を上回る場合には損失額となる。","a":"利益額"},{"cat":"7章 ビジネス計算","q":"ある度量衡の単位や通貨の単位で表した数量を，別の単位の数量に計算し直すこと。","a":"換算"},{"cat":"7章 ビジネス計算","q":"元金の貸し付けに対する報酬として支払われる金額。","a":"利息"},{"cat":"7章 ビジネス計算","q":"預け入れた元金に対してのみ利息が計算される利息のつき方。","a":"単利"},{"cat":"7章 ビジネス計算","q":"一定期間ごとに支払われる利息を元金に加えて，改めて利息が計算される利息のつき方。","a":"複利"},{"cat":"7章 ビジネス計算","q":"複利法で計算したときの，期間の終わる日における元利合計。","a":"複利終価"},{"cat":"7章 ビジネス計算","q":"利息の日数計算で，貸借期間の初日または最終日の一方のみを日数に入れる方法。","a":"片落とし"},{"cat":"7章 ビジネス計算","q":"利息の日数計算で，貸借期間の初日と最終日の両方ともを日数に入れる方法。","a":"両端入れ"},{"cat":"7章 ビジネス計算","q":"手形割引の際に差し引かれる金額。割引日から手形の満期日までの日数に応じた利息。","a":"割引料"},{"cat":"7章 ビジネス計算","q":"手形金額から割引料を差し引いた金額。","a":"手取金"},{"cat":"7章 ビジネス計算","q":"一定の金額が一定期間ごとに継続して受け払いされる場合において，受け払いされる金額。","a":"積立金（年金）"},{"cat":"7章 ビジネス計算","q":"最終期末における積立金（年金）の合計額。","a":"複利年金終価"},{"cat":"7章 ビジネス計算","q":"株式の売買の際，取引が成立した1株あたりの金額。","a":"約定値段"},{"cat":"7章 ビジネス計算","q":"株式に投資した金額に対する予想配当金の割合。","a":"利回り"},{"cat":"7章 ビジネス計算","q":"株式投資をする場合に指定する，希望の株価。指値注文の場合，希望株価に達しなければ取引は成立しない。","a":"指値"},{"cat":"7章 ビジネス計算","q":"公社債などが利払日と利払日の途中で売買された場合に考慮する，前回の利払い日から売買日までの利子。","a":"経過利子"},{"cat":"8章 身近な地域のビジネス","q":"住まいの近くに店がなかったり，店に行く交通手段がなかったりするために，日常の買い物に大きな不便を感じている人々。","a":"買い物弱者"},{"cat":"8章 身近な地域のビジネス","q":"国や地方自治体が，就業の斡旋などの取り組みを通じて地域の活性化を目指すこと。","a":"地方創生"},{"cat":"8章 身近な地域のビジネス","q":"地域独自の魅力を掘り起こし，内外の人々に向けてわかりやすく伝える活動。","a":"地域ブランディング"},{"cat":"8章 身近な地域のビジネス","q":"観光地としての魅力を高めるための活動（観光地経営）の担い手となる組織。","a":"DMO"},{"cat":"8章 身近な地域のビジネス","q":"観光地に数多くの観光客が押し寄せることで，地域住民の生活や自然環境などに悪影響がもたらされること。","a":"オーバーツーリズム"},{"cat":"8章 身近な地域のビジネス","q":"訪日外国人観光客による日本国内での消費。","a":"インバウンド消費"},{"cat":"8章 身近な地域のビジネス","q":"単なる移動手段としてではなく，乗車すること自体を観光の目的とした列車。","a":"観光列車"},{"cat":"8章 身近な地域のビジネス","q":"特定の地域内に限って通用する通貨。地域経済の活性化に繋がる役割を持つ。","a":"地域通貨"},{"cat":"8章 身近な地域のビジネス","q":"地域住民が主体となり，地域が抱える課題をビジネスの考え方によって解決しようとする活動。","a":"コミュニティ・ビジネス"},{"cat":"8章 身近な地域のビジネス","q":"建物に大規模な増築や改築を施すこと。","a":"リノベーション"}];
const CATEGORIES=["1章 商業の学習とビジネス", "2章 ビジネスとコミュニケーション", "3章 経済と流通の基礎", "4章 さまざまなビジネス", "5章 企業活動の基礎", "6章 ビジネスと売買取引", "7章 ビジネス計算", "8章 身近な地域のビジネス"];
const CAT_COL=Object.fromEntries(CATEGORIES.map((c,i)=>[c,'col-'+((i%8)+1)]));
const STORE='biz_basic_terms_v1_';
const CHARS=[
  {score:0,icon:'🥚',name:'Lv.1 まなびのたまご'},{score:20,icon:'🐣',name:'Lv.2 ビジネス入門者'},
  {score:50,icon:'🐥',name:'Lv.3 若手スタッフ'},{score:100,icon:'🐢',name:'Lv.4 コツコツ商人'},
  {score:180,icon:'🐇',name:'Lv.5 俊敏な販売員'},{score:280,icon:'🦉',name:'Lv.6 知恵ある経営者'},
  {score:400,icon:'🐆',name:'Lv.7 流通の達人'},{score:550,icon:'🦁',name:'Lv.8 ビジネス王'},
  {score:750,icon:'🐲',name:'Lv.9 伝説の起業家'},{score:1000,icon:'👑',name:'Lv.MAX ビジネス基礎マスター'}
];
let playerName='', totalAcc=0, learnedMap={}, mistakes=[];
let deck=[], deckIdx=0, current=null, answered=false;
let lap=1, count=0, correct=0, currentCat='all', currentMode='all';
const MAX_Q=20;
const $=id=>document.getElementById(id);
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function keyOf(item){ return item.cat+'::'+item.a+'::'+item.q; }
function saveAll(){ localStorage.setItem(STORE+'name',playerName); localStorage.setItem(STORE+'total',String(totalAcc)); localStorage.setItem(STORE+'learned',JSON.stringify(learnedMap)); localStorage.setItem(STORE+'mistakes',JSON.stringify(mistakes)); }
function loadAll(){
  playerName=localStorage.getItem(STORE+'name')||''; totalAcc=Number(localStorage.getItem(STORE+'total')||0);
  try{learnedMap=JSON.parse(localStorage.getItem(STORE+'learned')||'{}');}catch(e){learnedMap={};}
  try{mistakes=JSON.parse(localStorage.getItem(STORE+'mistakes')||'[]');}catch(e){mistakes=[];}
  if(playerName){ $('playerName').value=playerName; $('playerName').readOnly=true; }
}
function lockName(){ const v=$('playerName').value.trim(); if(v){ playerName=v; $('playerName').readOnly=true; saveAll(); } }
function initSelects(){
  const catSel=$('catSel'); const counts={}; DATA.forEach(x=>counts[x.cat]=(counts[x.cat]||0)+1);
  catSel.innerHTML='<option value="all">全カテゴリ（'+DATA.length+'語）</option>'+CATEGORIES.map(c=>'<option value="'+escapeAttr(c)+'">'+escapeHtml(c)+'（'+counts[c]+'語）</option>').join('');
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }
function filteredBase(){
  return DATA.filter(x=>{
    if(currentCat!=='all' && x.cat!==currentCat) return false;
    const learned=!!learnedMap[keyOf(x)];
    if(currentMode==='unlearned' && learned) return false;
    return true;
  });
}
function buildDeck(){ deck=shuffle(filteredBase()).slice(0,MAX_Q); deckIdx=0; count=0; correct=0; lap=Number(localStorage.getItem(STORE+'lap_'+currentCat+'_'+currentMode)||1); $('stageClear').style.display='none'; $('quizArea').style.display='block'; nextQ(); updateUI(); }
function nextQ(){
  answered=false; $('resultMsg').innerHTML='';
  if(deckIdx>=deck.length) return showClear();
  current=deck[deckIdx];
  $('qCat').textContent=current.cat; $('qCat').className='cat-tag '+(CAT_COL[current.cat]||''); $('qCount').textContent=(deckIdx+1)+' / '+deck.length;
  $('qText').textContent=current.q;
  const pool=DATA.filter(x=>x.a!==current.a && (x.cat===current.cat || currentCat==='all')).map(x=>x.a);
  const unique=[...new Set(pool)];
  let wrong=shuffle(unique).slice(0,3);
  if(wrong.length<3) wrong=wrong.concat(shuffle([...new Set(DATA.map(x=>x.a).filter(a=>a!==current.a && !wrong.includes(a)))]).slice(0,3-wrong.length));
  const choices=shuffle([current.a,...wrong]);
  $('choicesGrid').innerHTML=choices.map((c,i)=>'<button class="c-btn '+(CAT_COL[current.cat]||'')+'" onclick="answer(this, '+JSON.stringify(c).replace(/"/g,'&quot;')+')">'+escapeHtml(c)+'</button>').join('');
  updateUI();
}
function answer(btn, choice){
  if (!$('playerName').value.trim()) {
    alert('名前を入力してください');
    return;
  }  if(answered) return; answered=true; count++; const ok=choice===current.a;
  const buttons=[...document.querySelectorAll('.c-btn')]; buttons.forEach(b=>{ b.disabled=true; if(b.textContent===current.a) b.classList.add('correct'); });
  if(ok){ correct++; totalAcc++; learnedMap[keyOf(current)]=true; $('resultMsg').innerHTML='<span class="ok">正解！</span> '+escapeHtml(current.a); }
  else{ btn.classList.add('wrong'); addMistake(current); $('resultMsg').innerHTML='<span class="ng">不正解。</span> 正解は「'+escapeHtml(current.a)+'」'; }
  deckIdx++; saveAll(); updateUI(); setTimeout(nextQ, ok?650:1150);
}
function addMistake(item){ const k=keyOf(item); if(!mistakes.some(m=>m.key===k)) mistakes.unshift({key:k,cat:item.cat,q:item.q,a:item.a}); }
function updateUI(){
  $('totalAcc').textContent=totalAcc; const learned=DATA.filter(x=>learnedMap[keyOf(x)]).length;
  $('sLearned').textContent=learned; $('sTotal').textContent=DATA.length; $('sUnlearned').textContent=DATA.length-learned; $('sPct').textContent=Math.round(learned/DATA.length*100)+'%';
  $('sc').textContent=correct; $('tc').textContent=count; $('remQ').textContent=Math.max(deck.length-deckIdx,0); $('lapNum').textContent=lap;
  $('progBar').style.width=(deck.length?Math.min(deckIdx/deck.length*100,100):0)+'%';
  $('mistakeCnt').textContent=mistakes.length; $('mistakeBtn').style.display=mistakes.length?'inline-block':'none';
  let ch=CHARS[0], next=null; for(let i=0;i<CHARS.length;i++){ if(totalAcc>=CHARS[i].score){ ch=CHARS[i]; next=CHARS[i+1]||null; } }
  $('charIcon').textContent=ch.icon; $('charName').textContent=ch.name; $('charNext').textContent=next?('あと '+(next.score-totalAcc)+' 問で進化'):'最高レベルです！';
}
function showClear(){
  $('quizArea').style.display='none'; $('stageClear').style.display='block'; $('progBar').style.width='100%';
  const rate=count?Math.round(correct/count*100):0; $('clearSub').innerHTML='今回の正解率：<b>'+rate+'%</b>（'+correct+' / '+count+'問）<br>続けると未習得問題を中心に復習できます。';
}
function nextLap(){ 
if (!$('playerName').value.trim()) {
    alert('名前を入力してください');
    return;
  }
  lap++; localStorage.setItem(STORE+'lap_'+currentCat+'_'+currentMode, String(lap)); buildDeck(); }
function skipQ(){ 
  if (!$('playerName').value.trim()) {
    alert('名前を入力してください');
    return;
  }  if(!answered && current){ deckIdx++; nextQ(); } }
function onFilterChange(){ currentCat=$('catSel').value; currentMode=$('modeSel').value; buildDeck(); }
function resetAll(){ if(confirm('学習記録・苦手リスト・名前をすべてリセットしますか？')){ Object.keys(localStorage).filter(k=>k.startsWith(STORE)).forEach(k=>localStorage.removeItem(k)); playerName=''; totalAcc=0; learnedMap={}; mistakes=[]; $('playerName').value=''; $('playerName').readOnly=false; buildDeck(); } }
function openMistake(){ renderMistakes(); $('mistakeModal').style.display='block'; }
function closeMistake(){ $('mistakeModal').style.display='none'; }
function renderMistakes(){
  const box=$('mistakeList'); if(!mistakes.length){ box.innerHTML='<p style="color:#888;font-size:13px;padding:8px;">苦手リストは空です。</p>'; return; }
  box.innerHTML=mistakes.map((m,i)=>'<div class="m-item"><div><div class="m-name">'+escapeHtml(m.a)+'</div><div class="m-cat">'+escapeHtml(m.cat)+'</div><div style="font-size:12px;color:#555;margin-top:3px;line-height:1.5;">'+escapeHtml(m.q)+'</div></div><button class="del-btn" onclick="delMistake('+i+')">削除</button></div>').join('');
}
function delMistake(i){ mistakes.splice(i,1); saveAll(); renderMistakes(); updateUI(); }
function openTermList(){
  const tbody=$('termTbody'); tbody.innerHTML=DATA.map(x=>'<tr><td>'+escapeHtml(x.cat)+'</td><td><b>'+escapeHtml(x.a)+'</b></td><td>'+escapeHtml(x.q)+'</td></tr>').join('');
  $('termModal').style.display='block';
}
function closeTermList(){ $('termModal').style.display='none'; }
window.addEventListener('click',e=>{ if(e.target.id==='mistakeModal') closeMistake(); if(e.target.id==='termModal') closeTermList(); });
loadAll(); initSelects(); buildDeck(); updateUI();
</script>
</body>
</html>
